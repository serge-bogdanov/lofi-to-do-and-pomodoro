<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/style.css">
  <script src="script.js" defer></script>
  <title>To-Do List by Bogdara</title>
</head>
<body>
  <div class="todo">
    <div class="todo__title-wrapper">
      <h1 class="todo__title">
        To-Do List
      </h1>
    </div>
    <form action="" class="todo__form todo-form">
      <input type="text" class="todo-form__input" placeholder="введите текст">
      <input class="todo-form__button" type="submit">
    </form>
    <ul class="todo__list">
    </ul>
  </div>
</body>
</html>
