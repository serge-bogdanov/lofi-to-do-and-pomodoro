<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="./styles/style.css">

<body>
  <div class="todo">
    <div class="todo__title-wrapper">
      <h1 class="todo__title">
        To-Do List
      </h1>
    </div>
    <form action="" class="todo__form todo-form">
        <input type="text" class="todo-form__input">
      <button class="todo-form__button" type="submit"></button>
    </form>
    <ul class="todo__list">
      <li class="todo__list-item todo-item">
          <label for="" class="todo-item__label">learn js</label>
          <input type="checkbox" class="todo-item__original-checkbox">
          <span class="todo-item__checkmark"></span>
      </li>
    </ul>
  </div>
